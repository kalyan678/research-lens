<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ResearchLens hybrid query result</title>
  <desc id="desc">A screenshot-style view of ResearchLens showing a hybrid provider result table.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="70" y="50" width="1140" height="660" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="112" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">Analysis result</text>
  <text x="112" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#64748b">Question: Which institutions have the most publications?</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="112" y="184" width="236" height="82" rx="18" fill="#eff6ff"/>
    <text x="134" y="216" font-size="14" fill="#475569">Provider</text>
    <text x="134" y="246" font-size="18" font-weight="800" fill="#1d4ed8">Hybrid fast path</text>
    <rect x="372" y="184" width="180" height="82" rx="18" fill="#f8fafc"/>
    <text x="394" y="216" font-size="14" fill="#475569">SQL attempts</text>
    <text x="394" y="248" font-size="28" font-weight="800" fill="#111827">1</text>
    <rect x="576" y="184" width="198" height="82" rx="18" fill="#f0fdf4"/>
    <text x="598" y="216" font-size="14" fill="#475569">Rows returned</text>
    <text x="598" y="248" font-size="28" font-weight="800" fill="#15803d">5</text>
    <rect x="798" y="184" width="198" height="82" rx="18" fill="#fff7ed"/>
    <text x="820" y="216" font-size="14" fill="#475569">Response time</text>
    <text x="820" y="248" font-size="28" font-weight="800" fill="#c2410c">0.31s</text>
  </g>

  <rect x="112" y="306" width="996" height="330" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="112" y="306" width="996" height="52" rx="18" fill="#f1f5f9"/>
  <text x="140" y="339" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#111827">Institution</text>
  <text x="850" y="339" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#111827">Publication count</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1f2937">
    <line x1="112" y1="410" x2="1108" y2="410" stroke="#e2e8f0"/>
    <line x1="112" y1="462" x2="1108" y2="462" stroke="#e2e8f0"/>
    <line x1="112" y1="514" x2="1108" y2="514" stroke="#e2e8f0"/>
    <line x1="112" y1="566" x2="1108" y2="566" stroke="#e2e8f0"/>
    <text x="140" y="393">Stanford University</text>
    <text x="924" y="393" font-weight="800">25</text>
    <text x="140" y="445">National University of Singapore</text>
    <text x="924" y="445" font-weight="800">12</text>
    <text x="140" y="497">Google (United States)</text>
    <text x="924" y="497" font-weight="800">11</text>
    <text x="140" y="549">Stanford Medicine</text>
    <text x="924" y="549" font-weight="800">11</text>
    <text x="140" y="601">Harvard University</text>
    <text x="924" y="601" font-weight="800">10</text>
  </g>

  <rect x="112" y="658" width="172" height="42" rx="14" fill="#2563eb"/>
  <text x="148" y="684" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">Download CSV</text>
  <text x="312" y="684" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">Showing up to 5 rows from a read-only query.</text>
</svg>
