<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ResearchLens SQL and safety view</title>
  <desc id="desc">A screenshot-style view of generated SQL and safety controls in ResearchLens.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="70" y="52" width="1140" height="656" rx="28" fill="#f8fafc" filter="url(#shadow)"/>
  <text x="112" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">SQL and safety</text>
  <text x="112" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#64748b">Generated SQL is inspectable before trusting the result.</text>

  <rect x="112" y="188" width="996" height="76" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="142" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" fill="#1d4ed8">Safety policy passed</text>
  <text x="142" y="246" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">One read-only SELECT statement, known tables only, executed through a read-only DuckDB connection.</text>

  <rect x="112" y="300" width="996" height="280" rx="18" fill="#0b1120"/>
  <text x="142" y="340" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#93c5fd">SELECT</text>
  <text x="204" y="340" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#e5e7eb">i.display_name AS institution,</text>
  <text x="142" y="370" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#e5e7eb">       COUNT(DISTINCT wai.work_id) AS publication_count</text>
  <text x="142" y="400" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#93c5fd">FROM</text>
  <text x="190" y="400" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#e5e7eb">work_author_institutions AS wai</text>
  <text x="142" y="430" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#93c5fd">JOIN</text>
  <text x="190" y="430" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#e5e7eb">institutions AS i ON i.id = wai.institution_id</text>
  <text x="142" y="460" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#93c5fd">GROUP BY</text>
  <text x="226" y="460" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#e5e7eb">i.id, i.display_name</text>
  <text x="142" y="490" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#93c5fd">ORDER BY</text>
  <text x="234" y="490" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#e5e7eb">publication_count DESC, institution</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="112" y="620" width="226" height="50" rx="14" fill="#dcfce7"/>
    <text x="138" y="651" font-size="15" font-weight="800" fill="#166534">Read-only execution</text>
    <rect x="366" y="620" width="226" height="50" rx="14" fill="#e0f2fe"/>
    <text x="392" y="651" font-size="15" font-weight="800" fill="#075985">Known tables only</text>
    <rect x="620" y="620" width="226" height="50" rx="14" fill="#fef3c7"/>
    <text x="646" y="651" font-size="15" font-weight="800" fill="#92400e">Row cap enforced</text>
    <rect x="874" y="620" width="234" height="50" rx="14" fill="#fae8ff"/>
    <text x="900" y="651" font-size="15" font-weight="800" fill="#86198f">One correction attempt</text>
  </g>
</svg>
